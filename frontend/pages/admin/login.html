<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — MAISON</title>
  <link rel="icon" type="image/png" href="/img/logo.png">
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Montserrat:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../../css/main.css" />
</head>

<body class="bg-[#111] min-h-screen flex items-center justify-center">
  <div class="w-full max-w-md px-8 py-12">
    <div class="mb-10 text-center">
      <div class="logo-text text-2xl tracking-[0.4em] text-white mb-2">MAISON</div>
      <p class="text-xs tracking-[0.3em] uppercase text-white/30">Painel Administrativo</p>
    </div>

    <!-- Card -->
    <div class="bg-[#1a1a1a] border border-white/5 p-8">
      <h1 class="font-cormorant text-2xl font-light text-white mb-6">Acesso Restrito</h1>

      <div id="error-msg" class="hidden bg-[#6D0F1F]/20 border border-[#6D0F1F]/40 p-3 mb-5">
        <p class="text-xs text-[#ff8090]" id="error-text">Credenciais inválidas</p>
      </div>

      <form onsubmit="handleAdminLogin(event)">
        <div class="form-group">
          <label class="form-label text-white/40">E-mail</label>
          <input type="email" id="email"
            class="form-input bg-white/5 border-white/10 text-white placeholder-white/20 focus:border-white/30"
            placeholder="admin@maison.com" required />
        </div>
        <div class="form-group">
          <label class="form-label text-white/40">Senha</label>
          <input type="password" id="senha"
            class="form-input bg-white/5 border-white/10 text-white placeholder-white/20 focus:border-white/30"
            placeholder="••••••••" required />
        </div>
        <button type="submit" id="btn" class="btn-wine w-full text-center mt-2 flex items-center justify-center gap-2">
          <span id="btn-text">Acessar Painel</span>
          <span id="btn-loader" class="loading-spinner hidden"></span>
        </button>
      </form>

      <div class="mt-6 pt-6 border-t border-white/5">
        <a href="../login.html" class="text-xs text-white/20 hover:text-white/40 transition-colors">← Voltar à loja</a>
      </div>
    </div>

    <p class="text-center text-xs text-white/10 mt-6">Demo: admin@maison.com / admin123</p>
  </div>

  <style>
    .form-input {
      background: rgba(255, 255, 255, 0.05) !important;
      border-color: rgba(255, 255, 255, 0.1) !important;
      color: white !important;
    }

    .form-input:focus {
      border-color: rgba(255, 255, 255, 0.3) !important;
    }

    .form-input::placeholder {
      color: rgba(255, 255, 255, 0.2);
    }

    .form-label {
      color: rgba(255, 255, 255, 0.35) !important;
    }
  </style>

  <script src="../../js/api.js"></script>
  <script src="../js/login.js"></script>
</body>

</html>
